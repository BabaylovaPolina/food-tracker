<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дневник питания</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .font-display { font-family: 'Cormorant Garamond', Georgia, serif; letter-spacing: 0.06em; }
  </style>
</head>
<body class="bg-[#F5F1EB] min-h-screen font-sans">

  <!-- Auth screen -->
  <div id="authScreen" class="hidden max-w-sm mx-auto px-6 pt-20">
    <div class="text-center mb-10">
      <h1 class="text-3xl font-display font-semibold text-[#2C3A2D]">Дневник питания</h1>
      <p class="text-sm text-gray-400 mt-1">Войди, чтобы данные синхронизировались</p>
    </div>
    <button onclick="signInGoogle()"
      class="w-full flex items-center justify-center gap-2 bg-white border border-gray-200 rounded-xl py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 shadow-sm mb-4 transition-colors">
      <svg class="w-5 h-5" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Войти через Google
    </button>
    <div class="flex items-center gap-3 mb-4">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="text-xs text-gray-400">или</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>
    <div class="space-y-2 mb-3">
      <input type="email" id="authEmail" placeholder="Email"
        class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#B8975A]">
      <input type="password" id="authPassword" placeholder="Пароль"
        class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#B8975A]"
        onkeydown="if(event.key==='Enter') signInEmail()">
    </div>
    <div class="flex gap-2">
      <button onclick="signInEmail()"
        class="flex-1 bg-[#2C3A2D] hover:bg-[#1E2B1F] text-white font-semibold py-2.5 rounded-xl text-sm transition-colors">Войти</button>
      <button onclick="registerEmail()"
        class="flex-1 bg-white border border-[#D5C9BB] text-[#3A5235] hover:bg-[#EEE8DF] font-semibold py-2.5 rounded-xl text-sm transition-colors">Регистрация</button>
    </div>
    <div id="authError" class="hidden text-red-500 text-xs text-center mt-3"></div>
  </div>

  <!-- App screen -->
  <div id="appScreen" class="hidden max-w-6xl mx-auto p-4 pb-12">

    <div class="flex items-center justify-between mb-5">
      <h1 class="text-2xl font-display font-semibold text-[#2C3A2D]">Дневник питания</h1>
      <button onclick="toggleSettings()" class="text-gray-400 hover:text-gray-600 text-xl px-1">&#9881;</button>
    </div>

    <!-- Settings panel (content rendered by JS) -->
    <div id="settings" class="hidden bg-white rounded-2xl p-4 mb-4 shadow-sm border border-[#E5DDD2]">
      <div id="settingsContent"></div>
    </div>

    <!-- Two-column layout on desktop -->
    <div class="grid grid-cols-1 lg:grid-cols-2 lg:gap-8 lg:items-start">

      <!-- Left column: today -->
      <div class="min-w-0">

        <!-- Summary (rendered by JS) -->
        <div class="bg-white rounded-2xl p-4 mb-4 shadow-sm border border-[#E5DDD2]">
          <div class="flex items-center justify-between mb-4">
            <button onclick="changeDay(-1)" class="text-gray-400 hover:text-gray-600 px-2 py-1 rounded-lg hover:bg-gray-50 transition-colors">&#8592;</button>
            <div class="flex items-center gap-1.5">
              <div class="text-xs text-gray-500 font-medium" id="dateDisplay"></div>
              <div class="relative">
                <button onclick="openCalendar()" class="text-gray-400 hover:text-[#B8975A] transition-colors text-base leading-none" title="Выбрать дату">&#128197;</button>
                <input type="date" id="datePicker" onchange="jumpToDate(this.value)"
                  class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
              </div>
            </div>
            <button onclick="changeDay(1)" id="btnNextDay" class="text-gray-400 hover:text-gray-600 px-2 py-1 rounded-lg hover:bg-gray-50 transition-colors disabled:opacity-25 disabled:cursor-default">&#8594;</button>
          </div>
          <div id="summaryContent"></div>
        </div>

        <!-- Input card -->
        <div id="inputCard" class="bg-white rounded-2xl p-4 mb-4 shadow-sm border border-[#E5DDD2]">
          <!-- Meal name + suggestions -->
          <div class="mb-3">
            <div class="flex gap-1.5 flex-wrap mb-2">
              <button onclick="setMealName('Завтрак')" id="suggest-Завтрак" class="px-3 py-1 rounded-full text-xs font-medium transition-colors bg-[#F5F1EB] text-[#3A5235] hover:bg-[#E5DDD2]">Завтрак</button>
              <button onclick="setMealName('Обед')"    id="suggest-Обед"    class="px-3 py-1 rounded-full text-xs font-medium transition-colors bg-[#F5F1EB] text-[#3A5235] hover:bg-[#E5DDD2]">Обед</button>
              <button onclick="setMealName('Ужин')"    id="suggest-Ужин"    class="px-3 py-1 rounded-full text-xs font-medium transition-colors bg-[#F5F1EB] text-[#3A5235] hover:bg-[#E5DDD2]">Ужин</button>
              <button onclick="setMealName('Перекус')" id="suggest-Перекус" class="px-3 py-1 rounded-full text-xs font-medium transition-colors bg-[#F5F1EB] text-[#3A5235] hover:bg-[#E5DDD2]">Перекус</button>
            </div>
            <input type="text" id="mealName" placeholder="Или введи своё название"
              oninput="updateSuggestionButtons()"
              class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#B8975A]">
          </div>

          <div class="flex gap-1 mb-4 bg-gray-100 rounded-xl p-1">
            <button onclick="switchTab('text')"   id="tab-text"   class="flex-1 py-1.5 rounded-lg text-sm font-medium transition-all bg-white shadow text-[#3A5235]">Текст</button>
            <button onclick="switchTab('photo')"  id="tab-photo"  class="flex-1 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-500">Фото</button>
            <button onclick="switchTab('manual')" id="tab-manual" class="flex-1 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-500">Вручную</button>
          </div>

          <div id="panel-text">
            <textarea id="textInput" rows="3"
              placeholder="Например: 200г куриной грудки и 150г гречки&#10;Enter — добавить, Shift+Enter — новая строка"
              class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#B8975A] resize-none"></textarea>
          </div>

          <div id="panel-photo" class="hidden">
            <div id="photoDropZone" onclick="document.getElementById('photoInput').click()"
              class="border-2 border-dashed border-gray-200 rounded-xl p-6 text-center cursor-pointer hover:border-[#C4B5A0] transition-colors">
              <div id="photoPlaceholder"><div class="text-4xl mb-2">&#128247;</div><div class="text-sm text-gray-400">Нажмите, чтобы выбрать фото</div></div>
              <img id="photoPreview" class="hidden max-h-52 mx-auto rounded-lg object-contain">
            </div>
            <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="handlePhotoSelect(event)">
          </div>

          <div id="panel-manual" class="hidden">
            <div id="manualFields" class="grid grid-cols-2 gap-2"></div>
          </div>

          <button onclick="addEntry()" id="submitBtn"
            class="w-full mt-3 bg-[#2C3A2D] hover:bg-[#1E2B1F] active:bg-[#141E15] text-white font-semibold py-2.5 rounded-xl transition-colors text-sm">
            Добавить
          </button>
          <div id="statusMsg" class="hidden text-center text-xs mt-2"></div>
        </div>

        <div id="foodLog" class="space-y-2 transition-opacity"></div>
      </div>

      <!-- Right column: charts (sticky on desktop) -->
      <div class="lg:sticky lg:top-4 mt-4 lg:mt-0">
        <div class="hidden lg:flex items-center mb-3 px-1">
          <span class="font-display text-lg font-semibold text-[#2C3A2D]">Сводка за период</span>
        </div>
        <button onclick="toggleCharts()"
          class="lg:hidden w-full bg-white rounded-2xl px-4 py-3 shadow-sm border border-[#E5DDD2] text-sm text-gray-500 hover:text-[#3A5235] transition-colors flex items-center justify-between mb-2">
          <span>Графики за период</span>
          <span id="chartsArrow" class="transition-transform">&#9662;</span>
        </button>
        <div id="chartsContent" class="hidden lg:block"></div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBrPqRg93W-lk4yOAURvJgzlvWuN69RiH4",
      authDomain: "food-tracker-776d1.firebaseapp.com",
      projectId: "food-tracker-776d1",
      storageBucket: "food-tracker-776d1.firebasestorage.app",
      messagingSenderId: "339630577973",
      appId: "1:339630577973:web:0746d92bbb8136a27f547c"
    });
    const auth = firebase.auth();
    const db   = firebase.firestore();

    // ── Macro definitions ─────────────────────────────────────────────────────

    const MACROS = [
      { key: 'calories', label: 'Калории',   unit: 'ккал', color: '#B8742A', bg: 'bg-[#FBF6EF]', text: 'text-[#9A6028]', bar: 'bg-[#B8742A]', defaultNorm: 2000, mult: null },
      { key: 'proteins', label: 'Белки',     unit: 'г',    color: '#4A7242', bg: 'bg-[#EFF4EE]', text: 'text-[#3D5E38]', bar: 'bg-[#4A7242]', defaultNorm: 100,  mult: 1.6  },
      { key: 'fats',     label: 'Жиры',      unit: 'г',    color: '#A88040', bg: 'bg-[#F8F3EC]', text: 'text-[#8A6830]', bar: 'bg-[#A88040]', defaultNorm: 60,   mult: 1.0  },
      { key: 'carbs',    label: 'Углеводы',  unit: 'г',    color: '#7A5872', bg: 'bg-[#F4EFF3]', text: 'text-[#6B4A65]', bar: 'bg-[#7A5872]', defaultNorm: 250,  mult: null },
      { key: 'fiber',    label: 'Клетчатка', unit: 'г',    color: '#567860', bg: 'bg-[#EEF3EF]', text: 'text-[#486850]', bar: 'bg-[#567860]', defaultNorm: 25,   mult: null },
    ];

    const DEFAULT_TRACKED = ['proteins', 'fats', 'fiber'];

    // ── State ─────────────────────────────────────────────────────────────────

    let currentUser   = null;
    let chartsPeriod   = 7;
    let chartsVisible  = false;
    let chartInstances = [];
    let userProfile   = { weight: null, trackedMacros: DEFAULT_TRACKED, customNorms: {} };
    let viewDate      = getToday();
    let dayEntries    = [];
    let editingId     = null;
    let unknownInForm = new Set();   // "не знаю" fields in add form
    let unknownInEdit = new Set();   // "не знаю" fields in edit form
    let currentTab    = 'text';
    let currentPhotoBase64 = null;
    let currentPhotoType   = null;

    // ── Helpers ───────────────────────────────────────────────────────────────

    function getMacro(key) { return MACROS.find(m => m.key === key); }

    function getTrackedMacros() {
      return MACROS.filter(m => (userProfile.trackedMacros || DEFAULT_TRACKED).includes(m.key));
    }

    function getNorm(key) {
      const m = getMacro(key);
      if (!m) return null;
      const custom = (userProfile.customNorms || {})[key];
      if (custom != null) return custom;
      if (m.mult && userProfile.weight) return Math.round(userProfile.weight * m.mult);
      return m.defaultNorm;
    }

    function buildSystemPrompt() {
      const tracked = getTrackedMacros();
      const fields  = tracked.map(m => `"${m.key}":число_или_null`).join(',');
      const labels  = tracked.map(m => `${m.label}(${m.unit})`).join(', ');
      return `Ты нутрициолог. Отвечаешь ТОЛЬКО JSON без пояснений: {"name":"кратко",${fields}}. ${labels}. Числа округлённые, null если не можешь оценить.`;
    }

    // ── Auth ──────────────────────────────────────────────────────────────────

    auth.onAuthStateChanged(user => {
      currentUser = user;
      if (user) {
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        const key = localStorage.getItem('geminiApiKey');
        if (key) document.getElementById('apiKey') && (document.getElementById('apiKey').value = key);
        initApp();
      } else {
        document.getElementById('authScreen').classList.remove('hidden');
        document.getElementById('appScreen').classList.add('hidden');
      }
    });

    async function signInGoogle() {
      try { clearAuthError(); await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
      catch (e) { if (e.code !== 'auth/popup-closed-by-user') showAuthError(friendlyAuthError(e.code)); }
    }
    async function signInEmail() {
      const email = document.getElementById('authEmail').value.trim();
      const pass  = document.getElementById('authPassword').value;
      if (!email || !pass) { showAuthError('Введи email и пароль'); return; }
      try { clearAuthError(); await auth.signInWithEmailAndPassword(email, pass); }
      catch (e) { showAuthError(friendlyAuthError(e.code)); }
    }
    async function registerEmail() {
      const email = document.getElementById('authEmail').value.trim();
      const pass  = document.getElementById('authPassword').value;
      if (!email || !pass) { showAuthError('Введи email и пароль'); return; }
      if (pass.length < 6) { showAuthError('Пароль минимум 6 символов'); return; }
      try { clearAuthError(); await auth.createUserWithEmailAndPassword(email, pass); }
      catch (e) { showAuthError(friendlyAuthError(e.code)); }
    }
    function signOut() { auth.signOut(); document.getElementById('settings').classList.add('hidden'); }
    function showAuthError(msg) { if (!msg) return; const el = document.getElementById('authError'); el.textContent = msg; el.classList.remove('hidden'); }
    function clearAuthError() { document.getElementById('authError').classList.add('hidden'); }
    function friendlyAuthError(code) {
      return ({ 'auth/user-not-found':'Пользователь не найден','auth/wrong-password':'Неверный пароль',
        'auth/invalid-credential':'Неверный email или пароль','auth/email-already-in-use':'Email уже используется',
        'auth/invalid-email':'Неверный формат email','auth/weak-password':'Пароль слишком слабый',
        'auth/too-many-requests':'Слишком много попыток' })[code] || 'Ошибка входа';
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    async function initApp() {
      await loadProfile();
      viewDate = getToday();
      renderSettingsPanel();
      updateDateDisplay();
      renderManualFields();
      resetMealName();
      loadDay();
      document.getElementById('textInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addEntry(); }
      });
      if (window.innerWidth >= 1024) renderCharts();
    }

    // ── Profile ───────────────────────────────────────────────────────────────

    function profileRef() {
      return db.collection('users').doc(currentUser.uid).collection('profile').doc('data');
    }

    async function loadProfile() {
      try {
        const doc = await profileRef().get();
        if (doc.exists) {
          const d = doc.data();
          userProfile = {
            weight:       d.weight       ?? null,
            trackedMacros: d.trackedMacros ?? DEFAULT_TRACKED,
            customNorms:  d.customNorms  ?? {},
          };
        }
      } catch (_) {}
    }

    async function saveProfile() {
      await profileRef().set(userProfile, { merge: true });
    }

    function saveApiKey() {
      localStorage.setItem('geminiApiKey', document.getElementById('apiKey').value.trim());
    }

    async function saveSettingsForm() {
      const w = parseFloat(document.getElementById('s-weight').value);
      if (w >= 30 && w <= 300) userProfile.weight = w;

      userProfile.trackedMacros = MACROS
        .filter(m => document.getElementById(`s-cb-${m.key}`)?.checked)
        .map(m => m.key);
      if (userProfile.trackedMacros.length === 0) userProfile.trackedMacros = DEFAULT_TRACKED;

      userProfile.customNorms = {};
      MACROS.forEach(m => {
        const val = parseFloat(document.getElementById(`s-norm-${m.key}`)?.value);
        if (!isNaN(val) && val > 0) userProfile.customNorms[m.key] = val;
      });

      await saveProfile();
      renderSettingsPanel();
      renderManualFields();
      updateTotals();
      document.getElementById('settings').classList.add('hidden');
    }

    // ── Settings panel render ─────────────────────────────────────────────────

    function renderSettingsPanel() {
      const user = auth.currentUser;
      const autoLabel = m => m.mult && userProfile.weight
        ? `авто: ${Math.round(userProfile.weight * m.mult)}${m.unit}`
        : `по умолчанию: ${m.defaultNorm}${m.unit}`;

      document.getElementById('settingsContent').innerHTML = `
        <div class="flex items-center justify-between mb-4">
          <div class="text-sm text-gray-600 truncate pr-2">Вы вошли как <span class="font-medium">${escHtml(user?.displayName || user?.email || '')}</span></div>
          <button onclick="signOut()" class="text-xs text-[#3A5235] hover:text-[#2C3A2D] shrink-0">Выйти</button>
        </div>

        <div class="border-t border-gray-100 pt-3 mb-3">
          <label class="block text-sm font-medium text-gray-700 mb-1">Вес (кг)</label>
          <input type="number" id="s-weight" value="${userProfile.weight || ''}" placeholder="60" min="30" max="300"
            class="w-32 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#B8975A]">
        </div>

        <div class="border-t border-gray-100 pt-3 mb-3">
          <div class="text-sm font-medium text-gray-700 mb-2">Отслеживаемые показатели</div>
          <div class="space-y-2">
            ${MACROS.map(m => `
              <div class="flex items-center gap-2">
                <input type="checkbox" id="s-cb-${m.key}" ${userProfile.trackedMacros.includes(m.key) ? 'checked' : ''}
                  class="w-4 h-4 accent-[#2C3A2D]">
                <label for="s-cb-${m.key}" class="text-sm text-gray-700 w-24">${m.label}</label>
                <span class="text-xs text-gray-400">норма:</span>
                <input type="number" id="s-norm-${m.key}" min="0"
                  value="${(userProfile.customNorms || {})[m.key] ?? ''}"
                  placeholder="${autoLabel(m)}"
                  class="flex-1 border border-gray-200 rounded-lg px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-[#B8975A]">
                <span class="text-xs text-gray-400">${m.unit}</span>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="border-t border-gray-100 pt-3 mb-3">
          <label class="block text-sm font-medium text-gray-700 mb-1">Gemini API ключ</label>
          <input type="password" id="apiKey" placeholder="AIza..."
            value="${localStorage.getItem('geminiApiKey') || ''}"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#B8975A]"
            oninput="saveApiKey()">
          <p class="text-xs text-gray-400 mt-1">Получить бесплатно: <a href="https://aistudio.google.com/apikey" target="_blank" class="underline">aistudio.google.com/apikey</a> · Хранится только в браузере</p>
        </div>

        <div class="flex items-center gap-3">
          <button onclick="saveSettingsForm()"
            class="bg-[#2C3A2D] hover:bg-[#1E2B1F] text-white text-sm font-semibold px-4 py-2 rounded-xl transition-colors">
            Сохранить
          </button>
          <span id="settings-saved" class="hidden text-xs text-green-600">Сохранено ✓</span>
        </div>
      `;
    }

    function toggleSettings() {
      const el = document.getElementById('settings');
      const wasHidden = el.classList.contains('hidden');
      el.classList.toggle('hidden');
      if (wasHidden) renderSettingsPanel();
    }

    // ── Manual fields render ──────────────────────────────────────────────────

    function renderManualFields() {
      const tracked = getTrackedMacros();
      const cols = tracked.length <= 3 ? 'grid-cols-' + tracked.length : 'grid-cols-2 sm:grid-cols-3';
      document.getElementById('manualFields').className = `grid ${cols} gap-2`;
      document.getElementById('manualFields').innerHTML = tracked.map(m => `
        <div>
          <div class="flex items-center justify-between mb-0.5">
            <label class="text-xs text-gray-500 pl-1">${m.label} (${m.unit})</label>
            <button onclick="toggleUnknownForm('${m.key}')" id="form-unk-btn-${m.key}"
              class="text-xs text-gray-400 hover:text-[#B8975A] transition-colors px-1">не знаю</button>
          </div>
          <input type="number" id="form-${m.key}" placeholder="0" min="0"
            class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#B8975A]">
        </div>
      `).join('');
    }

    function toggleUnknownForm(key) {
      const inp = document.getElementById(`form-${key}`);
      const btn = document.getElementById(`form-unk-btn-${key}`);
      if (unknownInForm.has(key)) {
        unknownInForm.delete(key);
        inp.disabled = false; inp.classList.remove('bg-gray-50', 'text-gray-400');
        inp.placeholder = '0'; btn.textContent = 'не знаю'; btn.classList.remove('text-rose-400');
      } else {
        unknownInForm.add(key);
        inp.value = ''; inp.disabled = true;
        inp.classList.add('bg-gray-50', 'text-gray-400'); inp.placeholder = '—';
        btn.textContent = 'отменить'; btn.classList.add('text-rose-400');
      }
    }

    // ── Firestore ─────────────────────────────────────────────────────────────

    function logRef(date) {
      return db.collection('users').doc(currentUser.uid).collection('logs').doc(date);
    }
    async function loadDay() {
      setDayLoading(true);
      try { const doc = await logRef(viewDate).get(); dayEntries = doc.exists ? (doc.data().entries || []) : []; }
      catch (_) { dayEntries = []; }
      renderLog(); updateTotals(); setDayLoading(false);
    }
    async function saveDay() { await logRef(viewDate).set({ entries: dayEntries }); }
    function setDayLoading(on) { document.getElementById('foodLog').style.opacity = on ? '0.4' : '1'; }

    // ── Date nav ──────────────────────────────────────────────────────────────

    function getToday() {
      const d = new Date();
      return _fmt(d.getFullYear(), d.getMonth() + 1, d.getDate());
    }

    const SUGGESTIONS = ['Завтрак', 'Обед', 'Ужин', 'Перекус'];

    function getDefaultMealName() {
      const h = new Date().getHours();
      if (h >= 6  && h < 11) return 'Завтрак';
      if (h >= 11 && h < 15) return 'Обед';
      if (h >= 15 && h < 18) return 'Перекус';
      if (h >= 18 && h < 23) return 'Ужин';
      return '';
    }

    function setMealName(name) {
      const inp = document.getElementById('mealName');
      inp.value = inp.value === name ? '' : name;
      updateSuggestionButtons();
    }

    function updateSuggestionButtons() {
      const val = document.getElementById('mealName').value;
      SUGGESTIONS.forEach(s => {
        const btn = document.getElementById(`suggest-${s}`);
        if (!btn) return;
        const active = val === s;
        btn.classList.toggle('bg-[#2C3A2D]', active);
        btn.classList.toggle('text-white',  active);
        btn.classList.toggle('bg-[#F5F1EB]',  !active);
        btn.classList.toggle('text-[#3A5235]', !active);
      });
    }

    function resetMealName() {
      document.getElementById('mealName').value = getDefaultMealName();
      updateSuggestionButtons();
    }

    function jumpToDate(dateStr) {
      if (!dateStr || dateStr > getToday()) return;
      viewDate = dateStr; editingId = null;
      updateDateDisplay(); loadDay();
    }

    function openCalendar() {
      const picker = document.getElementById('datePicker');
      try { picker.showPicker(); } catch (_) { picker.click(); }
    }

    function _fmt(y, m, d) {
      return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }

    function changeDay(delta) {
      const [y, m, d] = viewDate.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      date.setDate(date.getDate() + delta);
      const next = _fmt(date.getFullYear(), date.getMonth() + 1, date.getDate());
      if (next > getToday()) return;
      viewDate = next; editingId = null;
      updateDateDisplay(); loadDay();
    }

    function updateDateDisplay() {
      const today = getToday();
      const yestD = new Date(); yestD.setDate(yestD.getDate() - 1);
      const yStr = _fmt(yestD.getFullYear(), yestD.getMonth() + 1, yestD.getDate());
      const d = new Date(viewDate + 'T00:00:00');
      const s = d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
      document.getElementById('dateDisplay').textContent =
        viewDate === today ? 'Сегодня, ' + s : viewDate === yStr ? 'Вчера, ' + s :
        d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
      document.getElementById('btnNextDay').disabled = viewDate >= today;
      const picker = document.getElementById('datePicker');
      picker.value = viewDate;
      picker.max = today;
    }

    // ── Tabs ──────────────────────────────────────────────────────────────────

    function switchTab(tab) {
      currentTab = tab;
      ['text','photo','manual'].forEach(t => {
        document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== tab);
        const btn = document.getElementById(`tab-${t}`);
        if (t === tab) { btn.classList.add('bg-white','shadow','text-[#3A5235]'); btn.classList.remove('text-gray-500'); }
        else           { btn.classList.remove('bg-white','shadow','text-[#3A5235]'); btn.classList.add('text-gray-500'); }
      });
      setStatus('');
    }

    function handlePhotoSelect(event) {
      const file = event.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const [header, data] = e.target.result.split(',');
        currentPhotoBase64 = data; currentPhotoType = header.match(/:(.*?);/)[1];
        document.getElementById('photoPlaceholder').classList.add('hidden');
        const p = document.getElementById('photoPreview'); p.src = e.target.result; p.classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    }

    // ── Claude API ────────────────────────────────────────────────────────────

    function extractJson(text) {
      const m = text.match(/\{[\s\S]*?\}/);
      if (!m) throw new Error('Не удалось разобрать ответ');
      return JSON.parse(m[0]);
    }

    async function callGemini(parts) {
      const apiKey = localStorage.getItem('geminiApiKey');
      if (!apiKey) throw new Error('Введи Gemini API ключ в настройках (шестерёнка сверху)');
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            systemInstruction: { parts: [{ text: buildSystemPrompt() }] },
            contents: [{ parts }],
            generationConfig: { maxOutputTokens: 300 },
          }),
        }
      );
      if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || `Ошибка API: ${res.status}`); }
      return (await res.json()).candidates[0].content.parts[0].text;
    }

    // ── Add entry ─────────────────────────────────────────────────────────────

    async function addEntry() {
      setStatus(''); let entry;
      try {
        if (currentTab === 'text') {
          const text = document.getElementById('textInput').value.trim();
          if (!text) { setStatus('Напиши, что съела', true); return; }
          setLoading(true);
          const parsed = extractJson(await callGemini([{ text }]));
          parsed.name = document.getElementById('mealName').value.trim() || parsed.name;
          entry = makeEntry(parsed);
          document.getElementById('textInput').value = '';

        } else if (currentTab === 'photo') {
          if (!currentPhotoBase64) { setStatus('Выбери фото', true); return; }
          setLoading(true);
          const parsedPhoto = extractJson(await callGemini([
            { inline_data: { mime_type: currentPhotoType, data: currentPhotoBase64 } },
            { text: 'Определи КБЖУ для еды на фото.' },
          ]));
          parsedPhoto.name = document.getElementById('mealName').value.trim() || parsedPhoto.name;
          entry = makeEntry(parsedPhoto);
          currentPhotoBase64 = null; currentPhotoType = null;
          document.getElementById('photoPlaceholder').classList.remove('hidden');
          document.getElementById('photoPreview').classList.add('hidden');
          document.getElementById('photoInput').value = '';

        } else {
          const name = document.getElementById('mealName').value.trim() || 'Приём пищи';
          const vals = {};
          let hasAny = false;
          getTrackedMacros().forEach(m => {
            if (unknownInForm.has(m.key)) { vals[m.key] = null; }
            else {
              const v = parseFloat(document.getElementById(`form-${m.key}`)?.value) || 0;
              vals[m.key] = v; if (v > 0) hasAny = true;
            }
          });
          if (!hasAny && unknownInForm.size === 0) { setStatus('Введи хотя бы одно значение', true); return; }
          entry = makeEntry({ name, ...vals });
          getTrackedMacros().forEach(m => {
            const inp = document.getElementById(`form-${m.key}`);
            if (inp) inp.value = '';
          });
          unknownInForm.clear();
          renderManualFields();
        }

        dayEntries.push(entry);
        await saveDay(); renderLog(); updateTotals();
        resetMealName();
        setStatus('Добавлено ✓');
      } catch (err) { setStatus(err.message, true); }
      finally { setLoading(false); }
    }

    function makeEntry(data) {
      const e = { id: Date.now(), name: data.name || 'Блюдо',
        time: new Date().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' }) };
      MACROS.forEach(m => {
        const v = data[m.key];
        e[m.key] = (v === null || v === undefined) ? null : Math.round(+v || 0);
      });
      return e;
    }

    async function deleteEntry(id) {
      dayEntries = dayEntries.filter(e => e.id !== id);
      if (editingId === id) editingId = null;
      await saveDay(); renderLog(); updateTotals();
    }

    // ── Edit entry ────────────────────────────────────────────────────────────

    function startEdit(id) {
      editingId = id;
      unknownInEdit = new Set();
      const e = dayEntries.find(x => x.id === id);
      MACROS.forEach(m => { if (e[m.key] === null) unknownInEdit.add(m.key); });
      renderLog();
    }

    function cancelEdit() { editingId = null; renderLog(); }

    async function saveEdit(id) {
      const e = dayEntries.find(x => x.id === id);
      if (!e) return;
      e.name = document.getElementById(`edit-name-${id}`).value.trim() || e.name;
      getTrackedMacros().forEach(m => {
        if (unknownInEdit.has(m.key)) { e[m.key] = null; }
        else { e[m.key] = Math.round(parseFloat(document.getElementById(`edit-${m.key}-${id}`)?.value) || 0); }
      });
      editingId = null;
      await saveDay(); renderLog(); updateTotals();
    }

    function toggleUnknownEdit(id, key) {
      const inp = document.getElementById(`edit-${key}-${id}`);
      const btn = document.getElementById(`edit-unk-btn-${key}-${id}`);
      if (unknownInEdit.has(key)) {
        unknownInEdit.delete(key);
        inp.disabled = false; inp.classList.remove('bg-gray-50');
        inp.placeholder = '0'; btn.textContent = 'не знаю'; btn.classList.remove('text-rose-400');
      } else {
        unknownInEdit.add(key);
        inp.value = ''; inp.disabled = true;
        inp.classList.add('bg-gray-50'); inp.placeholder = '—';
        btn.textContent = 'отменить'; btn.classList.add('text-rose-400');
      }
    }

    // ── Totals & assessment ───────────────────────────────────────────────────

    function updateTotals() {
      const tracked = getTrackedMacros();
      const totals = {};
      tracked.forEach(m => { totals[m.key] = dayEntries.reduce((s, e) => s + (e[m.key] ?? 0), 0); });

      const bars = tracked.map(m => {
        const norm = getNorm(m.key);
        const total = totals[m.key];
        const uncapped = norm ? Math.round(total / norm * 100) : 0;
        const pct = m.key === 'proteins' ? Math.min(uncapped, 150) : Math.min(uncapped, 120);
        const overColor = 'bg-[#8B4040]';
        const barColor  = (pct > 110 && m.key !== 'proteins') ? overColor : m.bar;
        const normText  = norm ? `${total}${m.unit} / ${norm}${m.unit}` : `${total}${m.unit}`;
        return `
          <div>
            <div class="flex justify-between text-xs mb-1">
              <span class="${m.text} font-medium">${m.label}</span>
              <span class="text-gray-500">${normText}</span>
            </div>
            <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
              <div class="h-full ${barColor} rounded-full transition-all duration-500" style="width:${pct}%"></div>
            </div>
          </div>`;
      }).join('');

      const assessment = buildAssessment(totals, tracked);
      document.getElementById('summaryContent').innerHTML = `
        <div class="space-y-3">${bars}</div>
        ${assessment ? `<div class="mt-4 pt-3 border-t border-gray-100 text-sm text-center ${assessment.color}">${assessment.text}</div>` : ''}
      `;
    }

    function buildAssessment(totals, tracked) {
      if (dayEntries.length === 0) return null;
      const normedMacros = tracked.filter(m => getNorm(m.key));
      if (normedMacros.length === 0) return null;

      const ratios = normedMacros.map(m => totals[m.key] / getNorm(m.key));
      const avg = ratios.reduce((s, r) => s + r, 0) / ratios.length;

      const low  = normedMacros.filter((m, i) => ratios[i] < 0.6).map(m => m.label.toLowerCase());
      const high = normedMacros.filter((m, i) => ratios[i] > 1.2 && m.key !== 'proteins').map(m => m.label.toLowerCase());
      const good = normedMacros.filter((m, i) => ratios[i] >= 0.9 && ratios[i] <= 1.1).map(m => m.label.toLowerCase());

      if (avg >= 0.9 && high.length === 0)
        return { text: '🏆 Отличный день! Все нормы выполнены — так держать!', color: 'text-[#3D5E38]' };
      if (high.length > 0 && avg > 1.1)
        return { text: `⚠️ Многовато: ${high.join(', ')}. Следи за балансом.`, color: 'text-[#8B4040]' };
      if (avg >= 0.7) {
        const parts = [];
        if (good.length)  parts.push(`хорошо с ${good.join(' и ')}`);
        if (low.length)   parts.push(`добавь ${low.join(' и ')}`);
        if (high.length)  parts.push(`чуть меньше ${high.join(' и ')}`);
        return { text: '👍 ' + parts.join(', ').replace(/^./, c => c.toUpperCase()) + '.', color: 'text-[#8A6030]' };
      }
      if (avg >= 0.4)
        return { text: `💪 Продолжай! Нужно больше: ${low.join(', ')}.`, color: 'text-[#8A6030]' };
      return { text: '🍽 Сегодня очень мало съедено. Не забудь поесть!', color: 'text-[#8A6030]' };
    }

    // ── Render log ────────────────────────────────────────────────────────────

    function renderLog() {
      const container = document.getElementById('foodLog');
      if (dayEntries.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-400 text-sm py-8">Пока ничего не добавлено</p>';
        return;
      }
      container.innerHTML = dayEntries.slice().reverse().map(e =>
        e.id === editingId ? renderEditCard(e) : renderViewCard(e)
      ).join('');
    }

    function renderViewCard(e) {
      const tracked = getTrackedMacros();
      const macroBoxes = tracked.map(m => {
        const val = e[m.key];
        const display = val === null ? '<span class="text-gray-300">—</span>' : `${val}${m.unit === 'ккал' ? '' : 'г'}`;
        return `<div class="${m.bg} rounded-lg p-1.5 text-center">
          <div class="text-sm font-semibold ${m.text}">${display}</div>
          <div class="text-xs text-gray-400">${m.label.toLowerCase()}</div>
        </div>`;
      }).join('');
      const cols = tracked.length <= 3 ? `grid-cols-${tracked.length}` : tracked.length === 4 ? 'grid-cols-4' : 'grid-cols-3 sm:grid-cols-5';
      return `
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-[#E5DDD2]">
          <div class="flex justify-between items-start">
            <div><div class="font-medium text-gray-800 text-sm">${escHtml(e.name)}</div>
              <div class="text-xs text-gray-400 mt-0.5">${e.time}</div></div>
            <div class="flex gap-1 ml-2 mt-0.5">
              <button onclick="startEdit(${e.id})" class="text-gray-300 hover:text-blue-400 transition-colors text-sm px-1" title="Редактировать">✏️</button>
              <button onclick="deleteEntry(${e.id})" class="text-gray-300 hover:text-red-400 transition-colors text-lg leading-none px-1" title="Удалить">&times;</button>
            </div>
          </div>
          <div class="grid ${cols} gap-1.5 mt-3">${macroBoxes}</div>
        </div>`;
    }

    function renderEditCard(e) {
      const tracked = getTrackedMacros();
      const cols = tracked.length <= 3 ? `grid-cols-${tracked.length}` : tracked.length === 4 ? 'grid-cols-4' : 'grid-cols-3';
      const fields = tracked.map(m => {
        const isUnk = unknownInEdit.has(m.key);
        return `<div>
          <div class="flex items-center justify-between mb-0.5">
            <label class="text-xs text-gray-500">${m.label}</label>
            <button onclick="toggleUnknownEdit(${e.id},'${m.key}')" id="edit-unk-btn-${m.key}-${e.id}"
              class="text-xs ${isUnk ? 'text-rose-400' : 'text-gray-400'} hover:text-[#B8975A] transition-colors">${isUnk ? 'отменить' : 'не знаю'}</button>
          </div>
          <input type="number" id="edit-${m.key}-${e.id}" min="0"
            value="${isUnk ? '' : (e[m.key] ?? '')}"
            placeholder="${isUnk ? '—' : '0'}"
            ${isUnk ? 'disabled' : ''}
            class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#B8975A] ${isUnk ? 'bg-gray-50' : ''}">
        </div>`;
      }).join('');
      return `
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-[#C4B8A8]">
          <input type="text" id="edit-name-${e.id}" value="${escHtml(e.name)}"
            class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm font-medium mb-3 focus:outline-none focus:ring-2 focus:ring-[#B8975A]">
          <div class="grid ${cols} gap-2 mb-3">${fields}</div>
          <div class="flex gap-2">
            <button onclick="saveEdit(${e.id})"
              class="flex-1 bg-[#2C3A2D] hover:bg-[#1E2B1F] text-white text-sm font-semibold py-2 rounded-xl transition-colors">Сохранить</button>
            <button onclick="cancelEdit()"
              class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-semibold py-2 rounded-xl transition-colors">Отмена</button>
          </div>
        </div>`;
    }

    // ── Charts ────────────────────────────────────────────────────────────────

    function toggleCharts() {
      chartsVisible = !chartsVisible;
      const content = document.getElementById('chartsContent');
      const arrow   = document.getElementById('chartsArrow');
      content.classList.toggle('hidden', !chartsVisible);
      if (arrow) arrow.style.transform = chartsVisible ? 'rotate(180deg)' : '';
      if (chartsVisible && chartInstances.length === 0) renderCharts();
    }

    function setPeriod(days) {
      chartsPeriod = days;
      renderCharts();
    }

    async function loadPeriodData(days) {
      const dates = [];
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        dates.push(_fmt(d.getFullYear(), d.getMonth() + 1, d.getDate()));
      }
      const docs = await Promise.all(dates.map(date => logRef(date).get()));
      return dates.map((date, idx) => {
        const entries = docs[idx].exists ? (docs[idx].data().entries || []) : [];
        const totals = {};
        MACROS.forEach(m => { totals[m.key] = entries.reduce((s, e) => s + (e[m.key] ?? 0), 0); });
        return { date, totals };
      });
    }

    function destroyCharts() {
      chartInstances.forEach(c => c.destroy());
      chartInstances = [];
    }

    async function renderCharts() {
      destroyCharts();
      const content = document.getElementById('chartsContent');
      const periods = [7, 14, 30];
      const btnHtml = periods.map(p => {
        const active = p === chartsPeriod;
        return `<button onclick="setPeriod(${p})" id="period-${p}"
          class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${active ? 'bg-[#2C3A2D] text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}">${p} дней</button>`;
      }).join('');

      content.innerHTML = `
        <div class="flex gap-1 mb-3">${btnHtml}</div>
        <div id="chartsGrid" class="space-y-3">
          <div class="text-center text-sm text-gray-400 py-4">Загрузка...</div>
        </div>`;

      let periodData;
      try { periodData = await loadPeriodData(chartsPeriod); }
      catch (_) {
        document.getElementById('chartsGrid').innerHTML =
          '<div class="text-center text-sm text-red-400 py-4">Не удалось загрузить данные</div>';
        return;
      }

      const tracked = getTrackedMacros();
      const labels  = periodData.map(({ date }) => {
        const [, m, d] = date.split('-');
        return `${d}.${m}`;
      });

      const grid = document.getElementById('chartsGrid');
      if (!grid) return;
      grid.innerHTML = '';

      tracked.forEach(macro => {
        const norm = getNorm(macro.key);
        const normLabel = norm ? ` · норма ${norm}${macro.unit}` : '';
        const card = document.createElement('div');
        card.className = 'bg-white rounded-2xl p-3 shadow-sm border border-[#E5DDD2]';
        card.innerHTML = `
          <div class="text-xs font-medium text-gray-600 mb-2">${macro.label}${normLabel}</div>
          <div class="relative h-40"><canvas id="chart-${macro.key}"></canvas></div>`;
        grid.appendChild(card);

        const ctx = card.querySelector(`#chart-${macro.key}`).getContext('2d');
        const data = periodData.map(({ totals }) => totals[macro.key]);
        const datasets = [{
          data,
          borderColor: macro.color,
          backgroundColor: macro.color + '20',
          fill: true,
          tension: 0.3,
          pointRadius: 3,
          pointHoverRadius: 5,
        }];
        if (norm) {
          datasets.push({
            data: periodData.map(() => norm),
            borderColor: 'rgba(239,68,68,0.5)',
            borderDash: [5, 4],
            borderWidth: 1.5,
            pointRadius: 0,
            fill: false,
          });
        }
        chartInstances.push(new Chart(ctx, {
          type: 'line',
          data: { labels, datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: {
              callbacks: { label: ctx => `${ctx.parsed.y}${macro.unit}` }
            }},
            scales: {
              x: { ticks: { font: { size: 10 }, maxRotation: 0 }, grid: { display: false } },
              y: { min: 0, ticks: { font: { size: 10 } }, grid: { color: 'rgba(0,0,0,0.04)' } },
            },
          },
        }));
      });
    }

    // ── Utils ─────────────────────────────────────────────────────────────────

    function setStatus(msg, isError = false) {
      const el = document.getElementById('statusMsg');
      if (!msg) { el.classList.add('hidden'); return; }
      el.textContent = msg; el.classList.remove('hidden','text-red-500','text-gray-400');
      el.classList.add(isError ? 'text-red-500' : 'text-gray-400');
    }
    function setLoading(on) {
      const btn = document.getElementById('submitBtn');
      btn.disabled = on; btn.textContent = on ? 'Анализирую...' : 'Добавить';
      btn.classList.toggle('opacity-60', on); btn.classList.toggle('cursor-not-allowed', on);
    }
    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>

</body>
