<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ — Дневник питания</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .font-display { font-family: 'Cormorant Garamond', Georgia, serif; letter-spacing: 0.06em; }
  </style>
</head>
<body class="bg-[#F5F1EB] min-h-screen font-sans">

  <div class="max-w-2xl mx-auto px-6 pt-14 pb-12">
    <h1 class="text-3xl font-display font-semibold text-[#2C3A2D] mb-8">Пользователи</h1>

    <div id="loginSection" class="bg-white rounded-2xl p-5 shadow-sm border border-[#E5DDD2] mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-1">Токен доступа</label>
      <div class="flex gap-2">
        <input type="password" id="tokenInput" placeholder="ADMIN_TOKEN из Vercel"
          class="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#B8975A]"
          onkeydown="if(event.key==='Enter') loadUsers()">
        <button onclick="loadUsers()"
          class="bg-[#2C3A2D] hover:bg-[#1E2B1F] text-white font-semibold px-4 py-2 rounded-xl text-sm transition-colors">
          Войти
        </button>
      </div>
      <div id="loginError" class="hidden text-red-500 text-xs mt-2"></div>
    </div>

    <div id="usersSection" class="hidden">
      <div class="flex items-center justify-between mb-3">
        <span id="usersCount" class="text-sm text-gray-500"></span>
        <button onclick="loadUsers()" class="text-xs text-[#3A5235] hover:text-[#2C3A2D] transition-colors">Обновить</button>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-[#E5DDD2] overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-100">
              <th class="text-left text-xs font-medium text-gray-400 px-4 py-3">Email</th>
              <th class="text-left text-xs font-medium text-gray-400 px-4 py-3 hidden sm:table-cell">Имя</th>
              <th class="text-left text-xs font-medium text-gray-400 px-4 py-3">Регистрация</th>
              <th class="text-left text-xs font-medium text-gray-400 px-4 py-3 hidden sm:table-cell">Последний вход</th>
            </tr>
          </thead>
          <tbody id="usersTable"></tbody>
        </table>
      </div>
    </div>

    <div id="loadingSection" class="hidden text-center text-gray-400 text-sm py-8">Загрузка...</div>
  </div>

  <script>
    let savedToken = localStorage.getItem('adminToken') || '';
    if (savedToken) document.getElementById('tokenInput').value = savedToken;

    function fmtDate(ts) {
      if (!ts) return '—';
      const d = ts._seconds ? new Date(ts._seconds * 1000) : new Date(ts);
      return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    async function loadUsers() {
      const token = document.getElementById('tokenInput').value.trim();
      if (!token) return;
      localStorage.setItem('adminToken', token);

      document.getElementById('loginError').classList.add('hidden');
      document.getElementById('usersSection').classList.add('hidden');
      document.getElementById('loadingSection').classList.remove('hidden');

      try {
        const res = await fetch('/api/admin-users', {
          headers: { 'x-admin-token': token }
        });
        if (res.status === 401) {
          document.getElementById('loginError').textContent = 'Неверный токен';
          document.getElementById('loginError').classList.remove('hidden');
          document.getElementById('loadingSection').classList.add('hidden');
          return;
        }
        const { users } = await res.json();
        users.sort((a, b) => (b.createdAt?._seconds || 0) - (a.createdAt?._seconds || 0));

        document.getElementById('usersCount').textContent = `${users.length} пользователей`;
        document.getElementById('usersTable').innerHTML = users.map(u => `
          <tr class="border-b border-gray-50 last:border-0 hover:bg-[#FAF8F5] transition-colors">
            <td class="px-4 py-3 text-gray-800">${u.email || '—'}</td>
            <td class="px-4 py-3 text-gray-500 hidden sm:table-cell">${u.displayName || '—'}</td>
            <td class="px-4 py-3 text-gray-400 text-xs">${fmtDate(u.createdAt)}</td>
            <td class="px-4 py-3 text-gray-400 text-xs hidden sm:table-cell">${fmtDate(u.lastSeen)}</td>
          </tr>
        `).join('');

        document.getElementById('loadingSection').classList.add('hidden');
        document.getElementById('usersSection').classList.remove('hidden');
      } catch (e) {
        document.getElementById('loginError').textContent = 'Ошибка: ' + e.message;
        document.getElementById('loginError').classList.remove('hidden');
        document.getElementById('loadingSection').classList.add('hidden');
      }
    }

    if (savedToken) loadUsers();
  </script>
</body>
</html>
